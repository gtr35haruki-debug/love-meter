<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOVE METER 記録</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}
.wrap{
  width:min(1100px,94%);
  margin:20px auto;
}
.card{
  background:rgba(255,255,255,.08);
  padding:18px;
  border-radius:18px;
  margin-bottom:16px;
}
h1,h2{margin:0 0 12px}
input,button{
  padding:10px;
  border-radius:10px;
  border:0;
  margin-right:8px;
}
button{
  background:#ff5fa2;
  color:white;
  cursor:pointer;
}
canvas{
  width:100%;
  height:300px;
  background:#111;
  border-radius:14px;
  margin-top:10px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th,td{
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,.1);
  text-align:center;
}
th{background:rgba(255,255,255,.1)}
</style>
</head>

<body>
<div class="wrap">

<h1>📊 LOVE METER 記録</h1>

<div class="card">
<input id="codeInput" placeholder="セッションコード">
<button onclick="loadRecords()">読み込み</button>
<div id="list"></div>
</div>

<div id="detail" style="display:none">

<div class="card">
<h2>概要</h2>
<p>LOVE METER: <span id="mLove"></span></p>
<p>心拍同期: <span id="mSync"></span></p>
<p>心拍変動: <span id="mVar"></span></p>
<p>頬の同時反応: <span id="mCheek"></span></p>
</div>

<div class="card">
<h2>LOVE推移</h2>
<canvas id="loveChart" width="1000" height="300"></canvas>
</div>

<div class="card">
<h2>心拍推移</h2>
<canvas id="hrChart" width="1000" height="300"></canvas>
</div>

<div class="card">
<h2>詳細データ</h2>
<table>
<thead>
<tr>
<th>時間</th>
<th>ME</th>
<th>YOU</th>
<th>LOVE</th>
<th>同期</th>
<th>変動</th>
<th>頬</th>
</tr>
</thead>
<tbody id="dataBody"></tbody>
</table>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDa37qvYDZsdQC6EpMqiNpUqhEXoszvjRA",
  authDomain: "lovemeter-577b4.firebaseapp.com",
  databaseURL: "https://lovemeter-577b4-default-rtdb.firebaseio.com",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let rows = [];

function clamp(n){return Math.max(0,Math.min(100,Math.round(n)))}
function sign(x){return x>0?1:x<0?-1:0}

function score(ticks){
  const keys = Object.keys(ticks||{}).map(Number).sort((a,b)=>a-b);
  const r=[];

  for(let k of keys){
    const t=ticks[k];
    if(!t.me||!t.you)continue;

    r.push({
      me:t.me.hr,
      you:t.you.hr,
      cheekM:(t.me.cheek===1&&t.you.cheek===1)?1:0
    });
  }

  const out=[];

  for(let i=0;i<r.length;i++){
    const sub=r.slice(0,i+1);

    let denom=0,numer=0;

    for(let j=1;j<sub.length;j++){
      const dA=sub[j].me-sub[j-1].me;
      const dB=sub[j].you-sub[j-1].you;
      if(sign(dA)!==0){
        denom++;
        if(sign(dA)===sign(dB))numer++;
      }
    }

    const sync=denom?numer/denom:0;

    const me=sub.map(x=>x.me);
    const you=sub.map(x=>x.you);

    const vari=Math.min(((Math.max(...me)-Math.min(...me)+Math.max(...you)-Math.min(...you))/2)*2,100);

    const cheek=sub.filter(x=>x.cheekM===1).length/sub.length;

    const love=0.6*(sync*100)+0.3*vari+0.1*(cheek*100);

    out.push({
      me:sub[sub.length-1].me,
      you:sub[sub.length-1].you,
      love:clamp(love),
      sync:clamp(sync*100),
      vari:clamp(vari),
      cheek:clamp(cheek*100),
      time:i*10
    });
  }

  return out;
}

window.loadRecords = async function(){
  const code=document.getElementById("codeInput").value.toUpperCase();
  const snap=await get(ref(db,`sessions/${code}/history`));

  const list=document.getElementById("list");
  list.innerHTML="";

  if(!snap.exists()){
    list.innerHTML="データなし";
    return;
  }

  const data=snap.val();

  Object.entries(data).forEach(([id,rec])=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${new Date(Number(id)).toLocaleString()}</b>
      <button onclick='view(${JSON.stringify(rec.ticks)})'>見る</button>
    `;

    list.appendChild(div);
  });
}

window.view = function(ticks){
  rows=score(ticks);

  const last=rows[rows.length-1];

  document.getElementById("detail").style.display="block";

  mLove.textContent=last.love;
  mSync.textContent=last.sync;
  mVar.textContent=last.vari;
  mCheek.textContent=last.cheek;

  drawLove();
  drawHR();
  drawTable();
}

function drawLove(){
  const c=document.getElementById("loveChart");
  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  const pad=60,w=c.width-120,h=c.height-100;

  ctx.strokeRect(pad,40,w,h);

  for(let i=0;i<=100;i+=20){
    const y=40+h-(i/100*h);
    ctx.fillText(i,20,y);
    ctx.beginPath();
    ctx.moveTo(pad,y);
    ctx.lineTo(pad+w,y);
    ctx.stroke();
  }

  rows.forEach((r,i)=>{
    const x=pad+(i/(rows.length-1))*w;
    ctx.fillText(r.time+"s",x,40+h+20);
  });

  ctx.beginPath();
  rows.forEach((r,i)=>{
    const x=pad+(i/(rows.length-1))*w;
    const y=40+h-(r.love/100*h);
    if(i===0)ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.strokeStyle="#ff5fa2";
  ctx.stroke();
}

function drawHR(){
  const c=document.getElementById("hrChart");
  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  const pad=60,w=c.width-120,h=c.height-100;

  ctx.strokeRect(pad,40,w,h);

  const vals=rows.flatMap(r=>[r.me,r.you]);
  const min=Math.min(...vals)-5;
  const max=Math.max(...vals)+5;

  function y(v){return 40+h-((v-min)/(max-min))*h;}

  for(let i=min;i<=max;i+=10){
    const yy=y(i);
    ctx.fillText(i,20,yy);
    ctx.beginPath();
    ctx.moveTo(pad,yy);
    ctx.lineTo(pad+w,yy);
    ctx.stroke();
  }

  rows.forEach((r,i)=>{
    const x=pad+(i/(rows.length-1))*w;
    ctx.fillText(r.time+"s",x,40+h+20);
  });

  function line(key,color){
    ctx.beginPath();
    rows.forEach((r,i)=>{
      const x=pad+(i/(rows.length-1))*w;
      const yy=y(r[key]);
      if(i===0)ctx.moveTo(x,yy);
      else ctx.lineTo(x,yy);
    });
    ctx.strokeStyle=color;
    ctx.stroke();
  }

  line("me","pink");
  line("you","cyan");
}

function drawTable(){
  const body=document.getElementById("dataBody");
  body.innerHTML="";

  rows.forEach(r=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${r.time}s</td>
      <td>${r.me}</td>
      <td>${r.you}</td>
      <td>${r.love}</td>
      <td>${r.sync}</td>
      <td>${r.vari}</td>
      <td>${r.cheek}</td>
    `;

    body.appendChild(tr);
  });
}
</script>

</body>
</html>
